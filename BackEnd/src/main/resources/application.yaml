spring:
  application:
    name: RevaDo
  datasource:
    url: jdbc:sqlite:./revaDoDB.sqlite
    driver-class-name: org.sqlite.JDBC
  security:
    user:
      name: user
      password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql:true
    database-platform: org.hibernate.community.dialect.SQLiteDialect



