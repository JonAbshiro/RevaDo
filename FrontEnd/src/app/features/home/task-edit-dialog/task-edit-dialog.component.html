<h2 mat-dialog-title>
  {{ isCreateMode ? (data.isSubtask ? 'Create Subtask' : 'Create Task') : (data.isSubtask ? 'Edit Subtask' : 'Edit Task') }}
</h2>
<mat-dialog-content>
  <form [formGroup]="editForm">
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="3"></textarea>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status">
        <mat-option value="TODO">To Do</mat-option>
        <mat-option value="IN_PROGRESS">In Progress</mat-option>
        <mat-option value="DONE">Done</mat-option>
      </mat-select>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions>
  <button *ngIf="!isCreateMode" mat-button color="warn" (click)="delete()">Delete</button>
  <div class="spacer"></div>
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-flat-button color="primary" (click)="save()">{{ isCreateMode ? 'Create' : 'Save' }}</button>
</mat-dialog-actions>
