<mat-sidenav-container>

  <mat-sidenav mode="side" opened position="start" [disableClose]="true">
    <span>RevaDo</span>
    <h1>Welcome back.</h1>
    <p>Sign in to continue to your workspace.</p>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-card>

      <mat-card-header>
        <mat-card-title>Sign in</mat-card-title>
      </mat-card-header>

      <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate aria-label="Login form">

          <mat-form-field appearance="outline">
            <mat-label>Email address</mat-label>
            <input matInput type="email" formControlName="email" placeholder="you@example.com" autocomplete="email" aria-required="true"/>
            <mat-icon matPrefix>mail_outline</mat-icon>
            <mat-error>{{ getEmailError() }}</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Password</mat-label>
            <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="••••••••" autocomplete="current-password" aria-required="true"/>
            <mat-icon matPrefix>lock_outline</mat-icon>
            <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword" [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'">
              <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error>{{ getPasswordError() }}</mat-error>
          </mat-form-field>

          <button mat-flat-button type="submit" color="primary" [disabled]="isLoading()" aria-live="polite">
            <span *ngIf="!isLoading()" style="display:flex; align-items:center; gap:0.5rem;">
              <span>Sign in</span>
              <mat-icon>arrow_forward</mat-icon>
            </span>
            <mat-spinner *ngIf="isLoading()" diameter="22"></mat-spinner>
          </button>

          <mat-error *ngIf="isError()">{{ error() }}</mat-error>

        </form>
      </mat-card-content>

      <mat-card-actions align="start">
        <span>Don't have an account?</span>
        <a mat-button (click)="createAccount()">Create one</a>
      </mat-card-actions>

    </mat-card>
  </mat-sidenav-content>

</mat-sidenav-container>
