<div class="login-page">
  <!-- Decorative background grid -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <!-- Branding side panel -->
  <aside class="brand-panel" aria-hidden="true">
    <div class="brand-inner">
      <div class="brand-logo">
        <span class="logo-mark">RevaDo</span>
      </div>
      <div class="brand-copy">
        <h1 class="brand-headline">Welcome<br />back.</h1>
        <p class="brand-sub">Sign in to continue to your workspace.</p>
      </div>
      <div class="brand-decoration">
        <div class="deco-ring deco-ring--lg"></div>
        <div class="deco-ring deco-ring--md"></div>
        <div class="deco-ring deco-ring--sm"></div>
      </div>
    </div>
  </aside>

  <!-- Login form panel -->
  <main class="form-panel">
    <div class="form-card">
      <header class="form-header">
        <h2 class="form-title">Sign in</h2>
        <p class="form-subtitle">Enter your credentials to access your account</p>
      </header>

      <form
        [formGroup]="loginForm"
        (ngSubmit)="onSubmit()"
        class="login-form"
        novalidate
        aria-label="Login form"
      >
        <!-- Email field -->
        <mat-form-field appearance="outline" class="field-full">
          <mat-label>Email address</mat-label>
          <input
            matInput
            type="email"
            formControlName="email"
            placeholder="you@example.com"
            autocomplete="email"
            aria-required="true"
          />
          <mat-icon matPrefix class="field-icon">mail_outline</mat-icon>
          <mat-error>{{ getEmailError() }}</mat-error>
        </mat-form-field>

        <!-- Password field -->
        <mat-form-field appearance="outline" class="field-full">
          <mat-label>Password</mat-label>
          <input
            matInput
            [type]="hidePassword ? 'password' : 'text'"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
            aria-required="true"
          />
          <mat-icon matPrefix class="field-icon">lock_outline</mat-icon>
          <button
            mat-icon-button
            matSuffix
            type="button"
            (click)="hidePassword = !hidePassword"
            [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'"
            [attr.aria-pressed]="!hidePassword"
          >
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error>{{ getPasswordError() }}</mat-error>
        </mat-form-field>

        <!-- Remember me + Forgot password -->
        <div class="form-options">
          <mat-checkbox formControlName="rememberMe" color="primary" class="remember-check">
            Remember me
          </mat-checkbox>
          <a href="#" class="forgot-link" tabindex="0">Forgot password?</a>
        </div>

        <!-- Submit button -->
        <button
          mat-flat-button
          type="submit"
          class="submit-btn"
          color="primary"
          [disabled]="isLoading"
          aria-live="polite"
        >
          <span *ngIf="!isLoading" class="btn-content">
            <span>Sign in</span>
            <mat-icon class="btn-arrow">arrow_forward</mat-icon>
          </span>
          <mat-spinner *ngIf="isLoading" diameter="22" class="btn-spinner"></mat-spinner>
        </button>


      </form>

      <footer class="form-footer">
        <p>Don't have an account? <a href="#" class="signup-link">Create one</a></p>
      </footer>
    </div>
  </main>
</div>
